<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>STREAMER</title>
<link rel="stylesheet" href="/styles.css" />
<link rel="preload" href="/media/intro.mp4" as="video" type="video/mp4" />
  <link rel="preload" href="/media/zoom.mp4"  as="video" type="video/mp4" />
</head>
<body>
  <main id="stage">
    <video
      id="intro"
      class="layer"
      src="/media/intro.mp4"
      muted
      playsinline
      preload="auto"></video>

    <video
      id="zoom"
      class="layer hidden"
      src="/media/zoom.mp4"
      muted
      playsinline
      preload="auto"></video>

    <canvas id="three" class="layer hidden"></canvas>

    <div id="hud" class="hidden" aria-hidden="true">
      <button id="enter" type="button">
        <span class="label">enter</span>
        <span class="arrow">→</span>
      </button>
    </div>

    <div id="ca-banner" aria-label="contract address">CA: <span class="value">SOON</span></div>

    <button id="about-btn" type="button" aria-label="open about">
      <span class="dot"></span><span>about</span>
    </button>

    <aside id="about-panel" aria-hidden="true">
      <button class="close" type="button" aria-label="close">✕</button>
      <div class="eyebrow">— about</div>
      <h1>damage.</h1>
      <div class="rule"></div>
      <p>streamer, creator and developer. this corner is where it all happens — code, lives, editing.</p>
      <p>this site is a real-time 3D model of my setup, running straight in your browser.</p>
